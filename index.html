<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNSSJP PRO - Extractor de Efemérides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .console { font-family: 'Courier New', Courier, monospace; background-color: #050505; color: #00ff33; white-space: pre-wrap; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans p-4">

    <div class="container mx-auto max-w-2xl bg-gray-800 p-6 rounded shadow-lg border border-gray-700 mt-10">
        <header class="border-b border-gray-700 pb-4 mb-6">
            <h1 class="text-2xl font-bold text-green-400">GNSSJP PRO - IGS Downloader</h1>
            <p class="text-gray-400 text-sm">Generador de enlaces directos (Bypass CORS) | "Dato mata relato"</p>
        </header>

        <form id="form-extractor" onsubmit="procesarRinex(event)">
            <div class="mb-4">
                <label class="block text-sm mb-2 font-bold text-blue-400">1. Sube tu archivo RINEX (.obs) para extraer la fecha:</label>
                <input type="file" id="obs_file" required accept=".obs,.rnx" class="w-full bg-gray-700 p-3 rounded border border-blue-500 text-white">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition shadow-lg">Calcular y Generar Enlaces</button>
        </form>

        <div id="resultado-consola" class="console p-4 mt-6 h-32 overflow-y-auto border border-gray-700 rounded hidden"></div>
        
        <div id="enlaces-contenedor" class="mt-6 hidden">
            <h2 class="text-lg font-bold text-yellow-400 mb-3 border-b border-gray-700 pb-2">2. Descarga Directa (Click para bajar al teléfono):</h2>
            <div id="botones-descarga" class="grid grid-cols-1 gap-3">
                </div>
            <p class="text-xs text-gray-400 mt-4">* Nota: Descarga el archivo, descomprímelo en tu gestor de archivos y sube el .nav a la aplicación principal.</p>
        </div>
    </div>

    <script>
        function calcularDOY(year, month, day) {
            const current = new Date(Date.UTC(year, month - 1, day));
            const start = new Date(Date.UTC(year, 0, 1));
            return Math.floor((current - start) / 86400000) + 1;
        }

        async function procesarRinex(e) {
            e.preventDefault();
            const file = document.getElementById('obs_file').files[0];
            const consola = document.getElementById('resultado-consola');
            const contenedorEnlaces = document.getElementById('enlaces-contenedor');
            const contenedorBotones = document.getElementById('botones-descarga');
            
            consola.classList.remove('hidden');
            contenedorEnlaces.classList.add('hidden');
            contenedorBotones.innerHTML = '';
            consola.innerHTML = "> Leyendo cabecera del archivo...\n";

            try {
                // Leemos solo los primeros 100 KB para no saturar la RAM
                const slice = file.slice(0, 102400); 
                
                // CORRECCIÓN: Uso de FileReader en lugar de slice.text() para garantizar ejecución en WebViews
                const text = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => resolve(event.target.result);
                    reader.onerror = (error) => reject(new Error("Fallo de lectura nativa del archivo en el dispositivo."));
                    reader.readAsText(slice);
                });

                const lines = text.split(/\r?\n/);
                let fechaEncontrada = null;

                for (let line of lines) {
                    // CORRECCIÓN: Lógica universal para RINEX 2 y RINEX 3 leyendo "TIME OF FIRST OBS" en la cabecera
                    if (line.includes('TIME OF FIRST OBS')) {
                        let p = line.trim().split(/\s+/);
                        if (p.length >= 6) {
                            let y = parseInt(p[0]);
                            if (y < 100) y += (y > 70 ? 1900 : 2000); 
                            fechaEncontrada = {
                                year: y,
                                month: parseInt(p[1]),
                                day: parseInt(p[2]),
                                hour: parseInt(p[3])
                            };
                            break;
                        }
                    } 
                    // Fallback para épocas exclusivas de RINEX 3 si la cabecera está incompleta
                    else if (line.startsWith('>')) {
                        let p = line.substring(1).trim().split(/\s+/);
                        if (p.length >= 6) {
                            let y = parseInt(p[0]);
                            if (y < 100) y += 2000;
                            fechaEncontrada = {
                                year: y,
                                month: parseInt(p[1]),
                                day: parseInt(p[2]),
                                hour: parseInt(p[3])
                            };
                            break;
                        }
                    }
                }

                if (!fechaEncontrada) {
                    consola.innerHTML += "> [ERROR] No se detectó 'TIME OF FIRST OBS' ni etiqueta de época '>' en la cabecera.\n";
                    return;
                }

                const { year, month, day, hour } = fechaEncontrada;
                const doy = calcularDOY(year, month, day);
                const doyStr = String(doy).padStart(3, '0');
                const hourStr = String(hour).padStart(2, '0');

                consola.innerHTML += `> Fecha detectada: ${year}-${month}-${day} | Hora inicio: ${hourStr}:00\n`;
                consola.innerHTML += `> Día del Año (DOY): ${doyStr}\n`;
                consola.innerHTML += `> Construyendo rutas a servidores IGS/BKG...\n`;

                const prefijos = ['IGS', 'WRD', 'BKG', 'GOP'];
                
                // Generamos los archivos diarios consolidados
                prefijos.forEach(p => {
                    let filename = `BRDC00${p}_R_${year}${doyStr}0000_01D_MN.rnx.gz`;
                    let url = `https://igs.bkg.bund.de/root_ftp/IGS/BRDC/${year}/${doyStr}/${filename}`;
                    
                    let btn = document.createElement('a');
                    btn.href = url;
                    // CORRECCIÓN: Atributos para eludir el bloqueo de WebView y forzar descarga
                    btn.setAttribute("download", filename);
                    btn.target = "_top"; 
                    btn.className = "bg-green-700 hover:bg-green-600 text-white font-bold py-3 px-4 rounded text-center block transition border border-green-500 shadow-md cursor-pointer";
                    btn.innerHTML = `⬇️ Descargar ${filename} (Diario)`;
                    contenedorBotones.appendChild(btn);
                });

                consola.innerHTML += `> [ÉXITO] Enlaces generados y preparados para descarga nativa.\n`;
                contenedorEnlaces.classList.remove('hidden');

            } catch (err) {
                consola.innerHTML += `> [ERROR FATAL] ${err.message}\n`;
            }
        }
    </script>
</body>
</html>
